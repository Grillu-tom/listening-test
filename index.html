<label>Your ID:</label>
<input type="text" id="participant" placeholder="user001">

<hr>

<h2>Reference Comparison Test</h2>

<p>
Listen to the reference first, then determine whether X or Y
matches the reference.
</p>

<!-- REFERENCE -->
<h3>Reference</h3>

<audio controls>
  <source src="reference.wav" type="audio/wav">
</audio>

<hr>

<div id="comparisonContainer"></div>

<br>

<label>Optional comment:</label><br>
<textarea id="comment1"></textarea>

<hr>

<button onclick="submitTest()">Submit</button>

<script>

// =====================================
// FILES
// =====================================

// TRUE MATCH
const matchFile = "reference.wav";

// DIFFERENT FILE
const differentFile = "intruder.wav";

// RANDOMIZE X/Y
let comparisonFiles = [
  { label: "X", file: matchFile, isMatch: true },
  { label: "Y", file: differentFile, isMatch: false }
];

comparisonFiles.sort(() => Math.random() - 0.5);

// =====================================
// CREATE PLAYERS
// =====================================

const container =
  document.getElementById("comparisonContainer");

comparisonFiles.forEach(item => {

  container.innerHTML += `

    <h3>Audio ${item.label}</h3>

    <audio controls>
      <source src="${item.file}" type="audio/wav">
    </audio>

    <label>
      <input
        type="radio"
        name="comparison"
        value="${item.label}"
      >
      ${item.label} matches the reference
    </label>

    <br><br>

  `;

});

// =====================================
// SUBMIT
// =====================================

async function submitTest() {

  const participant =
    document.getElementById("participant").value;

  const selected =
    document.querySelector(
      'input[name="comparison"]:checked'
    )?.value || "";

  const comment =
    document.getElementById("comment1").value;

  // FIND CORRECT ANSWER
  const correctItem =
    comparisonFiles.find(item => item.isMatch);

  const correctAnswer =
    correctItem.label;

  const isCorrect =
    selected === correctAnswer;

  const responses = {

    "Reference_Test_ANSWER": {
      answer: selected,
      chiave: "comparison"
    },

    "Reference_Test_CORRECT": {
      answer: isCorrect,
      chiave: "score"
    },

    "Reference_Test_ORDER": {
      answer:
        comparisonFiles
          .map(item => `${item.label}:${item.file}`)
          .join(","),
      chiave: "order"
    },

    ...(comment && {

      "Reference_Test_COMMENT": {
        answer: comment,
        chiave: "comment"
      }

    })

  };

  try {

    await fetch(
      "https://script.google.com/macros/s/AKfycbxZcnmbUs3bwtbBTu-e2Fw8ONPd6cBFNj5tUmCtEh7Og9pAZWzBxbYjG34Gmn_AsJpi/exec",
      {
        method: "POST",

        mode: "no-cors",

        body: new URLSearchParams({
          participant: participant,
          responses: JSON.stringify(responses)
        })
      }
    );

    alert("Responses sent!");

  } catch(error) {

    console.error(error);

    alert("FETCH ERROR");

  }

}

</script>
