<label>Your ID:</label>
<input type="text" id="participant" placeholder="user001">

<hr>

<h2>Reference Comparison Test</h2>

<p>
Listen to the reference first, then determine whether
Audio A or Audio B matches the reference.
</p>

<!-- REFERENCE -->
<h3>Reference</h3>

<audio controls controlsList="nodownload noplaybackrate noremoteplayback">
  <source src="reference.wav" type="audio/wav">
</audio>

<hr>

<div id="comparisonContainer"></div>

<br>

<label>Optional comment:</label><br>
<textarea id="comment1"></textarea>

<hr>

<button id="submitButton" onclick="submitTest()">
  Submit
</button>

<script>

// =====================================
// TRUE FILES
// =====================================

const matchFile = "reference.wav";

const differentFile = "intruder.wav";

// =====================================
// RANDOMLY ASSIGN MATCH TO A OR B
// =====================================

const matchIsA = Math.random() < 0.5;

let comparisonFiles = [

  {
    visibleLabel: "A",
    hiddenIdentity: matchIsA ? "MATCH" : "DIFFERENT",
    file: matchIsA ? matchFile : differentFile,
    isCorrect: matchIsA
  },

  {
    visibleLabel: "B",
    hiddenIdentity: matchIsA ? "DIFFERENT" : "MATCH",
    file: matchIsA ? differentFile : matchFile,
    isCorrect: !matchIsA
  }

];

// =====================================
// CREATE PLAYERS
// =====================================

const container =
  document.getElementById("comparisonContainer");

comparisonFiles.forEach(item => {

  container.innerHTML += `

    <h3>Audio ${item.visibleLabel}</h3>

    <audio controls>
      <source src="${item.file}" type="audio/wav">
    </audio>

    <br><br>

    <label>
      <input
        type="radio"
        name="comparison"
        value="${item.visibleLabel}"
      >
      ${item.visibleLabel} matches the reference
    </label>

    <br><br>

  `;

});

// =====================================
// SUBMIT
// =====================================

async function submitTest() {

  // BUTTON CONTROL
  const button =
    document.getElementById("submitButton");

  button.disabled = true;

  button.innerText = "Sending...";

  // PARTICIPANT
  const participant =
    document.getElementById("participant").value;

  // SELECTED ANSWER
  const selected =
    document.querySelector(
      'input[name="comparison"]:checked'
    )?.value || "";

  // COMMENT
  const comment =
    document.getElementById("comment1").value;

  // FIND CORRECT ANSWER
  const correctItem =
    comparisonFiles.find(item => item.isCorrect);

  const correctAnswer =
    correctItem.visibleLabel;

  const isCorrect =
    selected === correctAnswer;

  // RESPONSES OBJECT
  const responses = {

    "Reference_Test_SELECTED": {
      answer: selected,
      chiave: "selected"
    },

    "Reference_Test_CORRECT": {
      answer: isCorrect,
      chiave: "score"
    },

    // SAVE HIDDEN ORDER
    "Reference_Test_MAPPING": {
      answer:
        comparisonFiles
          .map(
            item =>
              `${item.visibleLabel}:${item.hiddenIdentity}`
          )
          .join(","),
      chiave: "mapping"
    },

    ...(comment && {

      "Reference_Test_COMMENT": {
        answer: comment,
        chiave: "comment"
      }

    })

  };

  // SEND
  try {

    await fetch(
      "https://script.google.com/macros/s/AKfycbxZcnmbUs3bwtbBTu-e2Fw8ONPd6cBFNj5tUmCtEh7Og9pAZWzBxbYjG34Gmn_AsJpi/exec",
      {
        method: "POST",

        mode: "no-cors",

        body: new URLSearchParams({
          participant: participant,
          responses: JSON.stringify(responses)
        })
      }
    );

    button.innerText = "Submitted ✓";

    alert("Responses sent!");

  } catch(error) {

    console.error(error);

    button.disabled = false;

    button.innerText = "Submit";

    alert("FETCH ERROR");

  }

}

</script>
